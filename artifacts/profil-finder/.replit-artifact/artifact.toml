kind = "web"
previewPath = "/"
title = "ProfilFinder.at"
version = "1.0.0"
id = "artifacts/profil-finder"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24347

[services.development]
run = "pnpm --filter @workspace/profil-finder run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/profil-finder", "run", "build" ]
publicDir = "artifacts/profil-finder/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24347"
BASE_PATH = "/"
